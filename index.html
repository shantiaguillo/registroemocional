<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RegistroEmocional</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f9;
    padding: 20px;
}

h1 {
    text-align: center;
}

form {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

input, button {
    padding: 8px;
    font-size: 14px;
}

button {
    grid-column: span 3;
    background-color: #2d89ef;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #1b5fad;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
}

th {
    background-color: #2d89ef;
    color: white;
}
</style>
</head>

<body>

<h1>Registro Emocional Diario</h1>

<form id="inventoryForm">
    <input type="text" id="sit" placeholder="Situación" required>
    <input type="text" id="pen" placeholder="Pensamiento" required>
    <input type="text" id="senfis" placeholder="Sensación Física" required>
    <input type="text" id="emo" placeholder="Emoción" required>
    <input type="text" id="ints" placeholder="Intensidad" required>
    <input type="date" id="date" required>
    <button type="submit">Agregar Registro</button>
</form>

<table>
    <thead>
        <tr>
            <th>Situación</th>
            <th>Pensamiento</th>
            <th>Sensación Fisica</th>
            <th>Emoción</th>
            <th>Intensidad</th>
            <th>Fecha</th>
        </tr>
    </thead>
    <tbody id="inventoryTable">
    </tbody>
</table>

<script>
const form = document.getElementById("inventoryForm");
const table = document.getElementById("inventoryTable");

document.addEventListener("DOMContentLoaded", loadData);

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const product = {
        sit: document.getElementById("sit").value,
        pen: document.getElementById("pen").value,
        senfis: document.getElementById("senfis").value,
        emo: document.getElementById("emo").value,
        ints: document.getElementById("ints").value,
        date: document.getElementById("date").value
    };

    saveData(product);
    addRow(product);
    form.reset();
});

function addRow(product) {
    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${product.sit}</td>
        <td>${product.pen}</td>
        <td>${product.senfis}</td>
        <td>${product.emo}</td>
        <td>$${product.ints}</td>
        <td>${product.date}</td>
    `;

    table.appendChild(row);
}

function saveData(product) {
    let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
    inventory.push(product);
    localStorage.setItem("inventory", JSON.stringify(inventory));
}

function loadData() {
    let inventory = JSON.parse(localStorage.getItem("inventory")) || [];
    inventory.forEach(addRow);
}
</script>

</body>
</html>
