<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Emocional</title>

<!-- Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">

<!-- CSS -->
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<h1>Registro Emocional Diario 🌿</h1>

<div class="toggle-container">
    <button id="darkToggle">🌙 Modo Oscuro</button>
</div>

<form id="inventoryForm" autocomplete="off">
    <input type="hidden" id="editIndex">

    <input type="text" id="sit" placeholder="Situación" required>
    <input type="text" id="pen" placeholder="Pensamiento" required>
    <input type="text" id="senfis" placeholder="Sensación Física" required>
    <input type="text" id="emo" placeholder="Emoción" required>

    <select id="ints" required>
        <option value="">Intensidad</option>
        <option value="Leve">Leve</option>
        <option value="Moderado">Moderado</option>
        <option value="Intenso">Intenso</option>
    </select>

    <input type="date" id="date" required>

    <button type="submit" id="submitBtn">Guardar Registro</button>
    <button type="button" id="downloadBtn">Descargar PDF 🌿</button>
</form>

<div class="table-container">
<table>
    <thead>
        <tr>
            <th>Situación</th>
            <th>Pensamiento</th>
            <th>Sensación Física</th>
            <th>Emoción</th>
            <th>Intensidad</th>
            <th>Fecha</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody id="inventoryTable"></tbody>
</table>
</div>

<!-- Librerías PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<!-- JS -->
<script src="js/app.js"></script>

</body>
</html>
